name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter docs build

      # Vercel handles deployment via GitHub integration
      # This workflow builds to verify the site compiles correctly
      # Connect the repo to Vercel and set:
      #   Root Directory: docs
      #   Build Command: pnpm install --frozen-lockfile && pnpm --filter docs build
      #   Output Directory: docs/.vitepress/dist
