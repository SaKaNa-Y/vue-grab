name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  pull_request:
    branches: [main]
    paths:
      - 'website/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter website build

      # Vercel handles deployment via GitHub integration
      # This workflow builds to verify the site compiles correctly
      # Connect the repo to Vercel and set:
      #   Root Directory: website
      #   Build Command: pnpm install --frozen-lockfile && pnpm --filter website build
      #   Output Directory: website/.vitepress/dist
